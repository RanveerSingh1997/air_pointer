name: air_pointer
description: 'Platform-agnostic canvas input for Flutter. Unifies mouse, trackpad, and MediaPipe hand-gesture events behind a single CanvasInputController.'
version: 0.1.0

repository: https://github.com/Ranveer-Singh-Gour/air_pointer

topics:
  - canvas
  - gestures
  - hand-tracking
  - mediapipe

environment:
  sdk: ^3.9.2
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  web: ^1.1.1

dev_dependencies:
  dart_code_linter: ^4.1.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
